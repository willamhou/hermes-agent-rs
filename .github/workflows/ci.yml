name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

      - name: Build release binary
        run: cargo build --release -p hermes-cli

  browser-live:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          install-dependencies: true

      - name: Show Chrome version
        run: ${{ steps.chrome.outputs.chrome-path }} --version

      - name: Run live browser cleanup tests
        env:
          CHROME: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          cargo test -p hermes-tools browser::tests -- --nocapture
          cargo test -p hermes-gateway reclaim_terminal_cleanup_resources_reclaims_live_browser_session_manifests -- --nocapture
